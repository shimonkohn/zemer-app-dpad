name: Android Debug Build

# Manual-only: produces a debug APK on demand and uploads it as a workflow artifact.
# Mirrors release-build.yml's environment setup (JDK 21, submodules, prebuilt native libs,
# Firebase config) but skips release-only steps (release signing, Crashlytics symbol upload,
# 16 KB alignment gate, Telegram). Build it from the Actions tab via "Run workflow".
on:
  workflow_dispatch:

env:
  USE_PREBUILT_NATIVE: true

jobs:
  assemble-debug:
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 21

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v4

      - name: Set up Android SDK
        uses: android-actions/setup-android@v3

      - name: Cache native libs
        id: cache-native
        uses: actions/cache@v4
        with:
          path: app/src/main/jniLibs
          key: bento4-libs-v1.0.1

      - name: Download prebuilt native libs
        if: steps.cache-native.outputs.cache-hit != 'true'
        run: |
          gh release download v1.0.1 --repo ZemerTeam/zemer-bento4 --pattern 'bento4-libs.zip'
          unzip bento4-libs.zip -d app/src/main
        env:
          GH_TOKEN: ${{ github.token }}

      - name: Configure Android SDK path
        run: echo "sdk.dir=$ANDROID_SDK_ROOT" > local.properties

      - name: Configure Firebase
        # The google-services plugin requires this for every variant (incl. debug).
        run: echo "${{ secrets.GOOGLE_SERVICES_JSON_BASE64 }}" | base64 -d > app/google-services.json

      - name: Generate persistent debug keystore
        # For non-PR events the `debug` build type signs with the `persistentDebug` config
        # (storeFile = app/persistent-debug.keystore, creds android/androiddebugkey/android),
        # which isn't committed. Generate one with those exact credentials so the build can sign.
        # Note: a fresh keystore per run means the signature isn't stable across runs, so a
        # reinstall over a previous debug build may need an uninstall first.
        run: |
          keytool -genkeypair -v \
            -keystore app/persistent-debug.keystore \
            -storepass android -keypass android \
            -alias androiddebugkey \
            -keyalg RSA -keysize 2048 -validity 10000 \
            -dname "CN=Android Debug,O=Android,C=US"

      - name: Assemble debug
        run: ./gradlew assembleDebug

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: debug-apk
          path: app/build/outputs/apk/debug/*.apk
          if-no-files-found: error
