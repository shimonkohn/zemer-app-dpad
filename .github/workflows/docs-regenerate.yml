name: Regenerate docs

# Keeps the code-derived docs (docs/repository-map.md, docs/build-release.md,
# docs/reference/*.md) in sync with the tracked source automatically. On every push to
# main it runs the generator and, if anything changed, commits the result back. Cheap
# (Python only, no Gradle/SDK). The commit uses GITHUB_TOKEN, whose pushes do NOT trigger
# further workflow runs, and carries [skip ci] — so there is no loop.

on:
  workflow_dispatch:
  push:
    branches: [ main ]

permissions:
  contents: write

concurrency:
  group: docs-regenerate
  cancel-in-progress: false

jobs:
  regenerate:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.x'

      - name: Install PyYAML
        run: pip install pyyaml

      - name: Regenerate code-derived docs
        run: python3 docs/generate.py

      - name: Commit if docs changed
        run: |
          if git diff --quiet -- docs/; then
            echo "Docs already up to date."
            exit 0
          fi
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add docs/
          git commit -m "docs: auto-regenerate code-derived docs [skip ci]"
          git push
