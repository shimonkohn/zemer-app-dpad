name: YouTube Player Monitor

on:
  schedule:
    - cron: '0 * * * *'   # every hour
  workflow_dispatch:        # manual trigger

jobs:
  check-player:
    runs-on: ubuntu-latest
    permissions:
      issues: write
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: true

      - name: Fetch current player hash from iframe_api
        id: player
        run: |
          HASH=$(curl -s "https://www.youtube.com/iframe_api" | grep -oE 'player.{0,2}[a-f0-9]{8}' | grep -oE '[a-f0-9]{8}' | head -1)
          echo "hash=$HASH" >> "$GITHUB_OUTPUT"
          echo "Current player: $HASH"

      # Check against the LIVE config file on zemer-cipher master — that is exactly what
      # deployed apps fetch and self-heal from (PlayerConfigStore), so this never false-alarms
      # when cipher master is ahead of the app's submodule pointer.
      - name: Check if hash is known in player_configs.json
        id: known
        run: |
          HASH="${{ steps.player.outputs.hash }}"
          CONFIGS=$(curl -fsS "https://raw.githubusercontent.com/ZemerTeam/zemer-cipher/master/library/src/main/assets/player_configs.json" \
            || cat cipher/library/src/main/assets/player_configs.json)
          if echo "$CONFIGS" | grep -q "\"$HASH\""; then
            echo "known=true" >> "$GITHUB_OUTPUT"
            echo "Hash $HASH is already in player_configs.json ✓"
          else
            echo "known=false" >> "$GITHUB_OUTPUT"
            echo "Hash $HASH is UNKNOWN — config update needed!"
          fi

      - name: Compute MD5 fallback hash
        id: md5
        if: steps.known.outputs.known == 'false'
        run: |
          HASH="${{ steps.player.outputs.hash }}"
          URL="https://www.youtube.com/s/player/${HASH}/player_ias.vflset/en_GB/base.js"
          MD5=$(curl -s "$URL" | head -c 10000 | md5sum | cut -c1-8)
          echo "md5=$MD5" >> "$GITHUB_OUTPUT"
          # Check if MD5 alias is known
          CONFIGS=$(curl -fsS "https://raw.githubusercontent.com/ZemerTeam/zemer-cipher/master/library/src/main/assets/player_configs.json" \
            || cat cipher/library/src/main/assets/player_configs.json)
          if echo "$CONFIGS" | grep -q "\"$MD5\""; then
            echo "md5_known=true" >> "$GITHUB_OUTPUT"
            echo "MD5 alias $MD5 is already known ✓"
          else
            echo "md5_known=false" >> "$GITHUB_OUTPUT"
            echo "MD5 alias $MD5 is also unknown"
          fi

      - name: Open issue for unknown player
        if: steps.known.outputs.known == 'false' && steps.md5.outputs.md5_known == 'false'
        uses: actions/github-script@v7
        with:
          script: |
            const hash = '${{ steps.player.outputs.hash }}';
            const md5 = '${{ steps.md5.outputs.md5 }}';
            const title = `New YouTube player detected: ${hash}`;

            // Check if issue already open for this hash
            const issues = await github.rest.issues.listForRepo({
              owner: context.repo.owner,
              repo: context.repo.repo,
              state: 'open',
              labels: 'player-update',
            });
            const exists = issues.data.some(i => i.title === title);
            if (exists) {
              console.log('Issue already open for this hash, skipping.');
              return;
            }

            await github.rest.issues.create({
              owner: context.repo.owner,
              repo: context.repo.repo,
              title,
              body: [
                '## New YouTube Player JS Detected',
                '',
                `- **Player hash**: \`${hash}\``,
                `- **MD5 fallback**: \`${md5}\``,
                `- **iframe_api URL**: https://www.youtube.com/iframe_api`,
                `- **player_ias URL**: https://www.youtube.com/s/player/${hash}/player_ias.vflset/en_GB/base.js`,
                '',
                '## Required action',
                '',
                `1. Derive + empirically validate: \`node tests/validate-player-config.mjs ${hash}\` (HTTP 206 = ground truth; prints a paste-ready JSON entry)`,
                '2. Add the entry to `library/src/main/assets/player_configs.json` in `zemer-cipher` (includes the MD5 alias)',
                '3. Push to `zemer-cipher` `master` — **deployed apps self-heal from that file within minutes; no APK release needed**',
                '4. Update the submodule pointer in `zemer-app` when convenient (keeps bundled defaults fresh for new installs)',
              ].join('\n'),
              labels: ['player-update', 'cipher'],
            });
            console.log(`Opened issue: ${title}`);

      - name: Send email notification
        if: steps.known.outputs.known == 'false' && steps.md5.outputs.md5_known == 'false'
        uses: dawidd6/action-send-mail@v3
        with:
          server_address: smtp.gmail.com
          server_port: 465
          secure: true
          username: ${{ secrets.GMAIL_USERNAME }}
          password: ${{ secrets.GMAIL_APP_PASSWORD }}
          subject: "New YouTube player detected: ${{ steps.player.outputs.hash }}"
          to: dietdroidwp@gmail.com
          from: Zemer CI <${{ secrets.GMAIL_USERNAME }}>
          body: |
            New YouTube player JS detected — cipher update required.

            Player hash: ${{ steps.player.outputs.hash }}
            MD5 fallback: ${{ steps.md5.outputs.md5 }}

            base.js: https://www.youtube.com/s/player/${{ steps.player.outputs.hash }}/player_ias.vflset/en_GB/base.js

            Steps:
            1. Derive + validate: node tests/validate-player-config.mjs ${{ steps.player.outputs.hash }}
               (HTTP 206 = ground truth; prints a paste-ready JSON entry)
            2. Add the entry to library/src/main/assets/player_configs.json in zemer-cipher
            3. Push to zemer-cipher master — deployed apps self-heal from that file
               within minutes; no APK release needed
            4. Update the submodule pointer in zemer-app when convenient

            GitHub issue: https://github.com/ZemerTeam/zemer-app/issues
