name: YouTube Player Monitor

on:
  schedule:
    - cron: '*/30 * * * *'   # every 30 min (each run is a fresh runner IP, so cadence adds no per-IP load)
  workflow_dispatch:        # manual trigger

# Serialize monitor runs: an overlapping schedule + manual dispatch must not both scan,
# both see "no open issue", then both open a duplicate. Queue rather than cancel so an
# in-progress scan (which may be mid-issue-creation) finishes cleanly.
concurrency:
  group: youtube-player-monitor
  cancel-in-progress: false

jobs:
  check-player:
    runs-on: ubuntu-latest
    permissions:
      issues: write
    steps:
      # Open issues as the Zemer-Dude GitHub App (logo avatar) instead of github-actions[bot].
      # Needs repo variable ZEMER_APP_ID + secret ZEMER_APP_PRIVATE_KEY, and the app must have
      # Issues: Read and write. If unconfigured, falls back to the default GITHUB_TOKEN.
      - name: Generate Zemer App token
        id: bot
        if: ${{ vars.ZEMER_APP_ID != '' }}
        uses: actions/create-github-app-token@v1
        with:
          app-id: ${{ vars.ZEMER_APP_ID }}
          private-key: ${{ secrets.ZEMER_APP_PRIVATE_KEY }}

      - uses: actions/checkout@v4
        with:
          submodules: true

      # Fetch the LIVE config file from zemer-cipher master ONCE — that is exactly what
      # deployed apps fetch and self-heal from (PlayerConfigStore), so a verdict against it
      # never false-alarms when cipher master is ahead of the app's submodule pointer.
      # The submodule copy is only an explicit, warned-about fallback (it can lag master);
      # if both sources fail the step fails, so a broken monitor is a red run, not silence.
      - name: Fetch known player configs
        run: |
          if curl -fsS --retry 3 --retry-delay 5 \
              "https://raw.githubusercontent.com/ZemerTeam/zemer-cipher/master/library/src/main/assets/player_configs.json" \
              -o /tmp/player_configs.json; then
            echo "Fetched live player_configs.json from zemer-cipher master"
          else
            echo "::warning::Could not fetch live player_configs.json from zemer-cipher master — falling back to the submodule copy, which can lag master and false-alarm"
            cp cipher/library/src/main/assets/player_configs.json /tmp/player_configs.json
          fi

      # Sample the live player surfaces MANY times per run, not once. YouTube A/B-tests new
      # players: a canary served ~1/6 of the time is missed ~83% of the time by a single
      # sample and only surfaces once it has already rotated in (i.e. once playback is already
      # breaking). Multi-sampling catches it the first hour it appears at all. "Known" is
      # decided by the harness loader (the app's PlayerConfigParser rules) against the live
      # file, including the md5 alias — same authority as before, applied to every distinct
      # hash seen. The scanner exits non-zero only if the live config itself is invalid
      # (devices would reject it wholesale) → a red run, which is the right alarm for that.
      - name: Scan live players (multi-sample to catch canaries early)
        id: scan
        run: |
          node tests/scan-live-players.mjs /tmp/player_configs.json 30 > /tmp/scan.json 2> /tmp/scan.log
          cat /tmp/scan.log
          COUNT=$(node -e "process.stdout.write(String((JSON.parse(require('fs').readFileSync('/tmp/scan.json','utf8')).unknown||[]).length))")
          echo "unknown_count=$COUNT" >> "$GITHUB_OUTPUT"
          {
            echo "summary<<SUMMARY_EOF"
            node -e "const s=JSON.parse(require('fs').readFileSync('/tmp/scan.json','utf8'));console.log((s.unknown||[]).map(u=>'- '+u.hash+' (seen '+u.count+'x of '+s.samples+', md5 '+u.md5+', sts '+u.sts+')').join('\n'))"
            echo "SUMMARY_EOF"
          } >> "$GITHUB_OUTPUT"

      - name: Open issues for unknown players
        if: steps.scan.outputs.unknown_count != '0'
        uses: actions/github-script@v7
        env:
          # Telegram notification target (same bot as release-build.yml).
          # t.me/c/4251718348/152 -> chat_id -1004251718348, message_thread_id 152 (the "test" topic).
          # The bot must be a member of that forum group with permission to post in the topic.
          # Empty TELEGRAM_BOT_TOKEN simply skips the Telegram send (issue creation still runs).
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: '-1004251718348'
          TELEGRAM_THREAD_ID: '152'
        with:
          github-token: ${{ steps.bot.outputs.token || github.token }}
          script: |
            const fs = require('fs');
            const scan = JSON.parse(fs.readFileSync('/tmp/scan.json', 'utf8'));
            // Dedup by issue TITLE across ALL open issues — NOT by label. Issues opened by the
            // Zemer-Dude app token arrive with no labels applied (observed: #141/#142/#143 for
            // a66f5a13 were all label-less), so a label-filtered query returns nothing and every
            // run re-opens a duplicate. The title `New YouTube player detected: <hash>` is unique
            // per hash and is the stable dedup key. paginate() so a long open-issue list can't
            // hide an existing match past the first page.
            const openIssues = await github.paginate(github.rest.issues.listForRepo, {
              owner: context.repo.owner,
              repo: context.repo.repo,
              state: 'open',
              per_page: 100,
            });
            const openTitles = new Set(openIssues.map(i => i.title));

            // Plain-text Telegram notification carrying the issue title + body verbatim.
            // Sent before issue creation so the alert still fires if the Issues API call fails
            // (mirrors the email step's "alert matters more than the issue" rule).
            async function notifyTelegram(title, body) {
              const token = process.env.TELEGRAM_BOT_TOKEN;
              if (!token) {
                console.log('No TELEGRAM_BOT_TOKEN — skipping Telegram notification.');
                return;
              }
              try {
                const resp = await fetch(`https://api.telegram.org/bot${token}/sendMessage`, {
                  method: 'POST',
                  headers: { 'Content-Type': 'application/json' },
                  body: JSON.stringify({
                    chat_id: process.env.TELEGRAM_CHAT_ID,
                    message_thread_id: Number(process.env.TELEGRAM_THREAD_ID),
                    text: `${title}\n\n${body}`,
                    link_preview_options: { is_disabled: true },
                  }),
                });
                if (!resp.ok) {
                  console.log(`::warning::Telegram send failed: ${resp.status} ${await resp.text()}`);
                }
              } catch (e) {
                console.log(`::warning::Telegram send errored: ${e.message}`);
              }
            }

            for (const u of scan.unknown) {
              const title = `New YouTube player detected: ${u.hash}`;
              if (openTitles.has(title)) {
                console.log(`Issue already open for ${u.hash}, skipping.`);
                continue;
              }
              const body = [
                '## New YouTube Player JS Detected',
                '',
                `- **Player hash**: \`${u.hash}\``,
                `- **MD5 fallback**: \`${u.md5}\``,
                `- **sts**: \`${u.sts}\``,
                `- **Observed this run**: seen ${u.count} of ${scan.samples} samples` +
                  (u.count * 3 < scan.samples ? ' — low-rate **canary**, caught early before it rotates in' : ''),
                `- **player_ias URL**: https://www.youtube.com/s/player/${u.hash}/player_ias.vflset/en_GB/base.js`,
                '',
                '## Required action',
                '',
                `1. Derive + empirically validate: \`node tests/validate-player-config.mjs ${u.hash}\` (HTTP 206 = ground truth; prints a paste-ready JSON entry)`,
                '2. Add the entry to `library/src/main/assets/player_configs.json` in `zemer-cipher` (includes the MD5 alias)',
                '3. Push to `zemer-cipher` `master` — **deployed apps self-heal from that file within minutes; no APK release needed**',
                '4. Update the submodule pointer in `zemer-app` when convenient (keeps bundled defaults fresh for new installs)',
              ].join('\n');

              await notifyTelegram(title, body);

              await github.rest.issues.create({
                owner: context.repo.owner,
                repo: context.repo.repo,
                title,
                body,
                labels: ['player-update', 'cipher'],
              });
              console.log(`Opened issue: ${title}`);
            }

      # !cancelled(): the email must still go out if issue creation fails (e.g. app token
      # missing the Issues permission) — the alert matters more than the issue.
      - name: Send email notification
        if: ${{ !cancelled() && steps.scan.outputs.unknown_count != '0' }}
        uses: dawidd6/action-send-mail@v3
        with:
          server_address: smtp.gmail.com
          server_port: 465
          secure: true
          username: ${{ secrets.GMAIL_USERNAME }}
          password: ${{ secrets.GMAIL_APP_PASSWORD }}
          subject: "New YouTube player(s) detected — cipher update required"
          to: dietdroidwp@gmail.com
          from: Zemer CI <${{ secrets.GMAIL_USERNAME }}>
          body: |
            New / unknown YouTube player(s) detected by the multi-sample monitor — cipher update required.
            (Low-rate hits are A/B canaries caught early, before they rotate in and break playback.)

            ${{ steps.scan.outputs.summary }}

            For each hash:
            1. Derive + validate: node tests/validate-player-config.mjs <hash>
               (HTTP 206 = ground truth; prints a paste-ready JSON entry)
            2. Add the entry to library/src/main/assets/player_configs.json in zemer-cipher
            3. Push to zemer-cipher master — deployed apps self-heal from that file
               within minutes; no APK release needed
            4. Update the submodule pointer in zemer-app when convenient

            GitHub issues: https://github.com/ZemerTeam/zemer-app/issues
