name: Android Release Build

on:
  workflow_dispatch:
    inputs:
      build_type:
        description: 'Build type'
        required: true
        default: 'quick'
        type: choice
        options:
          - quick
          - production
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

env:
  DISABLE_LTO: ${{ github.event.inputs.build_type != 'production' }}
  USE_PREBUILT_NATIVE: true

jobs:
  assemble-release:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 21
          cache: gradle

      - name: Set up Android SDK
        uses: android-actions/setup-android@v3

      - name: Download prebuilt native libs
        run: |
          gh release download v1.0.0 --repo ZemerTeam/zemer-bento4 --pattern 'bento4-libs.zip'
          unzip bento4-libs.zip -d app/src/main
        env:
          GH_TOKEN: ${{ github.token }}

      - name: Configure Android SDK path
        run: echo "sdk.dir=$ANDROID_SDK_ROOT" > local.properties

      - name: Configure release keystore
        run: |
          mkdir -p app/keystore
          echo "${{ secrets.RELEASE_KEYSTORE_BASE64 }}" | base64 -d > app/keystore/release.keystore

          {
            echo "STORE_PASSWORD=${{ secrets.STORE_PASSWORD }}"
            echo "KEY_PASSWORD=${{ secrets.KEY_PASSWORD }}"
            echo "KEY_ALIAS=${{ secrets.KEY_ALIAS }}"
          } >> "$GITHUB_ENV"

      - name: Make Gradle executable
        run: chmod +x gradlew

      - name: Assemble signed release
        run: ./gradlew --no-daemon --parallel --build-cache assembleRelease

      - name: Prepare release tag
        if: github.event_name != 'pull_request'
        run: echo "RELEASE_TAG=v${GITHUB_RUN_NUMBER}" >> "$GITHUB_ENV"

      - name: Publish GitHub release
        if: github.event_name != 'pull_request'
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ env.RELEASE_TAG }}
          name: Release ${{ env.RELEASE_TAG }}
          body: |
            Automated release build. Download the attached APK from the assets below.
          files: app/build/outputs/apk/release/*.apk
