name: Android Release Build

on:
  workflow_dispatch:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

env:
  USE_PREBUILT_NATIVE: true

jobs:
  assemble-release:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 21

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v4
        with:
          cache-read-only: ${{ github.ref != 'refs/heads/main' }}

      - name: Set up Android SDK
        uses: android-actions/setup-android@v3

      - name: Cache native libs
        id: cache-native
        uses: actions/cache@v4
        with:
          path: app/src/main/jniLibs
          key: bento4-libs-v1.0.0

      - name: Download prebuilt native libs
        if: steps.cache-native.outputs.cache-hit != 'true'
        run: |
          gh release download v1.0.0 --repo ZemerTeam/zemer-bento4 --pattern 'bento4-libs.zip'
          unzip bento4-libs.zip -d app/src/main
        env:
          GH_TOKEN: ${{ github.token }}

      - name: Configure Android SDK path
        run: echo "sdk.dir=$ANDROID_SDK_ROOT" > local.properties

      - name: Configure release keystore
        run: |
          mkdir -p app/keystore
          echo "${{ secrets.RELEASE_KEYSTORE_BASE64 }}" | base64 -d > app/keystore/release.keystore

          {
            echo "STORE_PASSWORD=${{ secrets.STORE_PASSWORD }}"
            echo "KEY_PASSWORD=${{ secrets.KEY_PASSWORD }}"
            echo "KEY_ALIAS=${{ secrets.KEY_ALIAS }}"
          } >> "$GITHUB_ENV"

      - name: Assemble signed release
        run: ./gradlew assembleRelease

      - name: Prepare release tag
        if: github.event_name != 'pull_request'
        run: echo "RELEASE_TAG=v${GITHUB_RUN_NUMBER}" >> "$GITHUB_ENV"

      - name: Publish GitHub release
        if: github.event_name != 'pull_request'
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ env.RELEASE_TAG }}
          name: Release ${{ env.RELEASE_TAG }}
          body: |
            Automated release build. Download the attached APK from the assets below.
          files: app/build/outputs/apk/release/*.apk
