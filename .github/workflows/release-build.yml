name: Android Release Build

on:
  workflow_dispatch:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  assemble-release:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 21
          cache: gradle

      - name: Set up Android SDK
        uses: android-actions/setup-android@v3

      - name: Cache NDK/CMake outputs
        uses: actions/cache@v4
        with:
          path: |
            app/.cxx
            ~/.cmake
          key: ndk-${{ runner.os }}-${{ hashFiles('app/src/main/cpp/**') }}
          restore-keys: ndk-${{ runner.os }}-
        with:
          api-level: 36
          build-tools: 36.1.0

      - name: Configure Android SDK path
        run: echo "sdk.dir=$ANDROID_SDK_ROOT" > local.properties

      - name: Configure release keystore
        run: |
          mkdir -p app/keystore
          echo "${{ secrets.RELEASE_KEYSTORE_BASE64 }}" | base64 -d > app/keystore/release.keystore

          {
            echo "STORE_PASSWORD=${{ secrets.STORE_PASSWORD }}"
            echo "KEY_PASSWORD=${{ secrets.KEY_PASSWORD }}"
            echo "KEY_ALIAS=${{ secrets.KEY_ALIAS }}"
          } >> "$GITHUB_ENV"

      - name: Make Gradle executable
        run: chmod +x gradlew

      - name: Assemble signed release
        run: ./gradlew --no-daemon --parallel --build-cache assembleRelease

      - name: Upload release APK
        uses: actions/upload-artifact@v4
        with:
          name: app-release-apk
          path: app/build/outputs/apk/release/*.apk
          if-no-files-found: error

      - name: Prepare release tag
        if: github.event_name != 'pull_request'
        run: echo "RELEASE_TAG=v${GITHUB_RUN_NUMBER}" >> "$GITHUB_ENV"

      - name: Publish GitHub release
        if: github.event_name != 'pull_request'
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ env.RELEASE_TAG }}
          name: Release ${{ env.RELEASE_TAG }}
          generate_release_notes: true
          files: app/build/outputs/apk/release/*.apk
