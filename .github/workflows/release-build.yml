name: Android Release Build

on:
  workflow_dispatch:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  assemble-release:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 21
          cache: gradle

      - name: Set up Android SDK
        uses: android-actions/setup-android@v3

      - name: Cache NDK/CMake outputs
        uses: actions/cache@v4
        with:
          path: |
            app/.cxx
            ~/.cmake
          key: ndk-${{ runner.os }}-${{ hashFiles('app/src/main/cpp/**') }}
          restore-keys: ndk-${{ runner.os }}-
        with:
          api-level: 36
          build-tools: 36.1.0

      - name: Configure Android SDK path
        run: echo "sdk.dir=$ANDROID_SDK_ROOT" > local.properties

      - name: Generate temporary release keystore
        run: |
          mkdir -p app/keystore
          STORE_PASSWORD=$(uuidgen)
          KEY_PASSWORD=$(uuidgen)
          KEY_ALIAS="ci-temp-key"

          echo "STORE_PASSWORD=$STORE_PASSWORD" >> "$GITHUB_ENV"
          echo "KEY_PASSWORD=$KEY_PASSWORD" >> "$GITHUB_ENV"
          echo "KEY_ALIAS=$KEY_ALIAS" >> "$GITHUB_ENV"

          keytool -genkeypair -v \
            -storetype PKCS12 \
            -keystore app/keystore/release.keystore \
            -storepass "$STORE_PASSWORD" \
            -keypass "$KEY_PASSWORD" \
            -alias "$KEY_ALIAS" \
            -keyalg RSA \
            -keysize 2048 \
            -validity 10000 \
            -dname "CN=CI,O=Zemer,OU=CI,L=Remote,S=Remote,C=US"

      - name: Make Gradle executable
        run: chmod +x gradlew

      - name: Assemble signed release
        run: ./gradlew --no-daemon --parallel --build-cache assembleRelease

      - name: Upload release APK
        uses: actions/upload-artifact@v4
        with:
          name: app-release-apk
          path: app/build/outputs/apk/release/*.apk
          if-no-files-found: error
